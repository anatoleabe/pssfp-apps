name: Lighthouse CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'library/**'
      - 'candidature/**'
      - 'packages/ui/**'

jobs:
  lighthouse:
    name: Lighthouse audit (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: frontend
            urls: |
              http://localhost:3000/
              http://localhost:3000/formations/specialites/fiscalite-finance-comptabilite-publique
              http://localhost:3000/actualites
              http://localhost:3000/contact
            min_perf: 90
            min_a11y: 90
            min_seo: 90
            min_bp: 90
          - app: library
            urls: |
              http://localhost:3001/
              http://localhost:3001/recherche
            min_perf: 85
            min_a11y: 90
            min_seo: 85
            min_bp: 85
          - app: candidature
            urls: |
              http://localhost:3002/
              http://localhost:3002/profil
            min_perf: 85
            min_a11y: 90
            min_seo: 85
            min_bp: 85

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: ${{ matrix.app }}
        run: pnpm build

      - name: Start app
        working-directory: ${{ matrix.app }}
        run: |
          pnpm start &
          sleep 8

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: ${{ matrix.urls }}
          configPath: './.github/lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Check thresholds
        run: |
          echo "Min Performance: ${{ matrix.min_perf }}"
          echo "Min Accessibility: ${{ matrix.min_a11y }}"
          echo "Min SEO: ${{ matrix.min_seo }}"
          echo "Min Best Practices: ${{ matrix.min_bp }}"
