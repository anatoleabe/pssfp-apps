# =============================================================================
# apply.pssfp.org — formulaire de candidature (Next.js :6003). LOT C.3.
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name apply.pssfp.org;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://apply.pssfp.org$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name apply.pssfp.org;

    ssl_certificate /etc/letsencrypt/live/apply.pssfp.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apply.pssfp.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # challenges.cloudflare.com requis par le widget Turnstile
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; connect-src 'self' https://api.pssfp.org; frame-src https://challenges.cloudflare.com; frame-ancestors 'none'; base-uri 'self'" always;

    access_log /var/log/nginx/apply.pssfp.org.access.log;
    error_log /var/log/nginx/apply.pssfp.org.error.log;

    # PII candidat : aucune mise en cache proxy
    location / {
        proxy_pass http://127.0.0.1:6003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "no-store" always;
    }

    location /_next/static {
        proxy_pass http://127.0.0.1:6003;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
