# =============================================================================
# pssfp.org — site institutionnel (Next.js :6001). LOT C.3.
# Derrière Cloudflare (proxy orange) : TLS Let's Encrypt à l'origine,
# vraie IP client restaurée via CF-Connecting-IP (cf. cloudflare-real-ip.conf).
# =============================================================================

# HTTP → HTTPS (+ challenge ACME)
server {
    listen 80;
    listen [::]:80;
    server_name pssfp.org www.pssfp.org;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://pssfp.org$request_uri; }
}

# www → apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.pssfp.org;
    ssl_certificate /etc/letsencrypt/live/pssfp.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pssfp.org/privkey.pem;
    return 301 https://pssfp.org$request_uri;
}

# Vhost principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pssfp.org;

    ssl_certificate /etc/letsencrypt/live/pssfp.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pssfp.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP à durcir progressivement (nonce en Phase II)
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://media.pssfp.org; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; connect-src 'self' https://api.pssfp.org; frame-ancestors 'none'; base-uri 'self'" always;

    access_log /var/log/nginx/pssfp.org.access.log;
    error_log /var/log/nginx/pssfp.org.error.log;

    location / {
        proxy_pass http://127.0.0.1:6001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Assets Next.js immutables
    location /_next/static {
        proxy_pass http://127.0.0.1:6001;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Photos institutionnelles committées (frontend/public/photos)
    location /photos/ {
        proxy_pass http://127.0.0.1:6001;
        add_header Cache-Control "public, max-age=86400";
    }
}
