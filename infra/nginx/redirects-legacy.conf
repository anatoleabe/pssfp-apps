# =============================================================================
# Redirections 301 — anciens domaines vers pssfp.org. LOT C.3 / plan §6.
# Décision Anatole 2026-07-04 : pssfp.org = canonique, apply.pssfp.org = candidature.
#
# NB : ces vhosts ne servent que si les DNS des anciens domaines pointent
# encore vers ce VPS. Pour pssfp.net géré dans Cloudflare, préférer une
# Redirect Rule Cloudflare (301 bulk) — ce fichier reste le filet côté origine.
# Certificats : étendre certbot à ces noms tant que les domaines sont détenus.
# =============================================================================

# pssfp.net (+ www) → pssfp.org
server {
    listen 80;
    listen [::]:80;
    server_name pssfp.net www.pssfp.net pssfp.cm www.pssfp.cm;
    return 301 https://pssfp.org$request_uri;
}

# candidature historique (.net + Joomla) → apply.pssfp.org
server {
    listen 80;
    listen [::]:80;
    server_name candidature.pssfp.net candidature.pfinancespubliques.org;
    return 301 https://apply.pssfp.org$request_uri;
}

# ancien site Joomla → pssfp.org
server {
    listen 80;
    listen [::]:80;
    server_name pfinancespubliques.org www.pfinancespubliques.org;
    return 301 https://pssfp.org$request_uri;
}

# biblio .net → .org (activable au lancement biblio)
server {
    listen 80;
    listen [::]:80;
    server_name bibliotheque.pssfp.net;
    return 301 https://bibliotheque.pssfp.org$request_uri;
}
