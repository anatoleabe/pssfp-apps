# =============================================================================
# Restauration de la vraie IP client derrière le proxy Cloudflare.
# À inclure dans le bloc http {} : `include /etc/nginx/cloudflare-real-ip.conf;`
#
# Sans ce fichier, $remote_addr = IP Cloudflare → throttles Laravel par IP
# (login 5/10min, forgot-pin 10/min, turnstile remoteip) frappent TOUS les
# candidats d'un coup. CRITIQUE pour le module candidature.
#
# Plages officielles : https://www.cloudflare.com/ips/ — à rafraîchir
# périodiquement (cron mensuel ou script infra/deploy/refresh-cf-ips.sh à créer).
# =============================================================================

