# =============================================================================
# media.pssfp.org — reverse-proxy public vers MinIO (127.0.0.1:9000). LOT C+.
#
# CRITIQUE : les URLs présignées (récépissé candidature, photo identité)
# embarquent leur host dans la signature SigV4 (X-Amz-SignedHeaders=host).
# MINIO_ENDPOINT côté Laravel DOIT être https://media.pssfp.org — signer
# pour 127.0.0.1:9000 produit une URL inaccessible depuis un navigateur
# externe (et si on la réécrit après coup, MinIO renvoie
# SignatureDoesNotMatch car le Host reçu ne correspond plus au Host signé).
#
# En conséquence, ce vhost préserve le Host tel quel (`$host` = media.pssfp.org,
# identique à ce que Laravel a signé) — ne JAMAIS le forcer à une valeur fixe.
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name media.pssfp.org;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://media.pssfp.org$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name media.pssfp.org;

    ssl_certificate /etc/letsencrypt/live/media.pssfp.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/media.pssfp.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Photos candidat (jusqu'à 5 Mo) + marge multipart/documents.
    client_max_body_size 20m;

    access_log /var/log/nginx/media.pssfp.org.access.log;
    error_log /var/log/nginx/media.pssfp.org.error.log;

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Jamais de buffering : préserve le corps binaire et la query string
        # de signature (X-Amz-Signature) exactement telle qu'envoyée.
        proxy_request_buffering off;
        proxy_buffering off;
    }
}
