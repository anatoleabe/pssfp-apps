# =============================================================================
# api.pssfp.org — API Laravel + admin Filament (PHP 8.3 FPM). LOT C.3.
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name api.pssfp.org;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://api.pssfp.org$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.pssfp.org;
    root /var/www/pssfp/backend/public;

    ssl_certificate /etc/letsencrypt/live/api.pssfp.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.pssfp.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/api.pssfp.org.access.log;
    error_log /var/log/nginx/api.pssfp.org.error.log;

    index index.php;
    client_max_body_size 12m;   # photo candidat 5 Mo + marge multipart

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60s;
    }

    # Jamais de dotfiles (sauf ACME)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
